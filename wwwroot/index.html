<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FolioIQ - Start Investing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div ws-replace="MainContent">
        <nav class="bg-white border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex-shrink-0 flex items-center">
                        <span class="text-2xl font-bold text-indigo-600">FolioIQ</span>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div class="grid md:grid-cols-2 gap-12 items-center">
                <div>
                    <h1 class="text-5xl font-extrabold text-slate-900 leading-tight mb-6">
                        Master the market without the <span class="text-indigo-600">risk</span>.
                    </h1>
                    <p class="text-xl text-slate-600 mb-8">
                        Join thousands of students learning to invest with €10,000 in virtual money. Real prices, real excitement, zero risk.
                    </p>
                </div>
                
                <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
                    <div ws-hole="AuthForm">
                        <!-- Login/Register forms will be injected here -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="text/javascript" src="/Content/FolioIQ.js"></script>
</body>
</html>
