<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaderboard - FolioIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div ws-replace="MainContent">
        <nav class="bg-white border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center space-x-8">
                        <a href="/dashboard" class="text-2xl font-bold text-indigo-600">FolioIQ</a>
                        <div class="flex space-x-4">
                            <a href="/dashboard" class="text-slate-500 hover:text-slate-900">Dashboard</a>
                            <a href="/leaderboard" class="text-slate-900 font-semibold">Leaderboard</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div class="text-center mb-12">
                <h1 class="text-4xl font-extrabold text-slate-900 mb-4">Global Leaderboard</h1>
                <p class="text-slate-600">See how you rank against other investors.</p>
            </div>

            <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase">
                        <tr>
                            <th class="px-8 py-4">Rank</th>
                            <th class="px-8 py-4">Investor</th>
                            <th class="px-8 py-4">Total Value</th>
                            <th class="px-8 py-4 text-right">Return</th>
                        </tr>
                    </thead>
                    <tbody ws-hole="LeaderboardList" class="divide-y divide-slate-100">
                        <!-- Leaderboard rows -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script type="text/javascript" src="/Content/FolioIQ.js"></script>
</body>
</html>
