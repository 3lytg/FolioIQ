<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Detail - FolioIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div ws-replace="MainContent">
        <nav class="bg-white border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center space-x-8">
                        <a href="/dashboard" class="text-2xl font-bold text-indigo-600">FolioIQ</a>
                        <div class="flex space-x-4">
                            <a href="/dashboard" class="text-slate-500 hover:text-slate-900">Dashboard</a>
                            <a href="/leaderboard" class="text-slate-500 hover:text-slate-900">Leaderboard</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="mb-8 flex justify-between items-start">
                <div>
                    <h1 ws-hole="Ticker" class="text-4xl font-bold text-slate-900"></h1>
                    <p ws-hole="CompanyName" class="text-lg text-slate-500"></p>
                </div>
                <div class="text-right">
                    <p ws-hole="Price" class="text-4xl font-bold"></p>
                    <p ws-hole="Change" class="text-lg font-semibold"></p>
                </div>
            </div>

            <div class="grid lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <h2 class="font-bold text-slate-800 mb-6">7-Day Price History</h2>
                        <canvas id="priceChart" height="200"></canvas>
                    </div>
                </div>

                <div class="space-y-8">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <h2 class="font-bold text-slate-800 mb-4">Trade</h2>
                        <div class="space-y-4">
                            <div class="flex p-1 bg-slate-100 rounded-lg">
                                <button ws-onclick="SetBuy" id="buyBtn" class="flex-1 py-2 text-sm font-semibold rounded-md bg-white shadow-sm text-indigo-600">Buy</button>
                                <button ws-onclick="SetSell" id="sellBtn" class="flex-1 py-2 text-sm font-semibold rounded-md text-slate-500">Sell</button>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Shares</label>
                                <input ws-var="Shares" type="number" step="0.01" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            <div class="border-t border-slate-100 pt-4">
                                <div class="flex justify-between text-sm mb-2">
                                    <span class="text-slate-500">Estimated Total</span>
                                    <span ws-hole="EstimatedTotal" class="font-bold"></span>
                                </div>
                                <button ws-onclick="ExecuteTrade" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition-colors">Confirm Order</button>
                            </div>
                            <p ws-hole="TradeMessage" class="text-sm text-center"></p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="text/javascript" src="/Content/FolioIQ.js"></script>
</body>
</html>
